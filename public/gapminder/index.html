    <script>
      // TEMP diagnostics: surface fatal errors visibly (remove after debugging)
      (function () {
        function box() {
          var d = document.getElementById("fatal");
          if (!d) {
            d = document.createElement("div");
            d.id = "fatal";
            d.style.cssText =
              "position:fixed;z-index:99999;top:8px;left:8px;right:8px;padding:12px;" +
              "background:#7f1d1d;color:#fff;font:13px/1.5 monospace;border-radius:8px;" +
              "white-space:pre-wrap;max-height:45vh;overflow:auto;";
            (document.body || document.documentElement).appendChild(d);
          }
          return d;
        }
        window.addEventListener(
          "error",
          function (e) {
            box().textContent +=
              (e.message || "Script error") + "\n  @ " + (e.filename || "") + ":" + (e.lineno || "") + "\n";
          },
          true
        );
        window.addEventListener("unhandledrejection", function (e) {
          var r = e.reason;
          box().textContent += "Promise: " + ((r && (r.stack || r.message)) || String(r)) + "\n";
        });
      })();
    </script>
